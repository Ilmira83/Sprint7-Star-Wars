<header class="header">
  <nav class="social-nav">
    <ul class="social-list d-flex">
      <li class="tiktok-icon me-4">
        <a href="https://www.tiktok.com/@starwars" target="_blank">
          <i class="fab fa-tiktok" style="color: white; font-size: 25px"></i>
        </a>
      </li>
      <li class="instagram-icon me-4">
        <a href="https://www.instagram.com/starwars/" target="_blank">
          <i
            class="fa-brands fa-instagram"
            style="color: white; font-size: 25px"
          ></i>
        </a>
      </li>
      <li class="twitter-icon me-4">
        <a href="https://twitter.com/starwars" target="_blank">
          <i
            class="fa-brands fa-x-twitter"
            style="color: white; font-size: 25px"
          ></i>
        </a>
      </li>
      <li class="facebook-icon me-4">
        <a href="https://facebook.com/starwars" target="_blank">
          <i
            class="fa-brands fa-facebook"
            style="color: white; font-size: 25px"
          ></i>
        </a>
      </li>
    </ul>
  </nav>
  <div class="main-logo text-end pb-3 pt-2">
    <a
      routerLink="/app-home"
      routerLinkActive="active"
      ariaCurrentWhenActive="page"
    >
      <img
        src="assets/mainLogo.png"
        alt="Star Wars Logo"
        width="250"
        height="100"
      />
    </a>
  </div>
  <div class="header-buttons">
    <div class="search d-flex">
      @if(!searchInputActive){
      <button
        type="button"
        class="btn search-button text-white fs-6 me-3"
        (click)="showInput()"
      >
        <i class="fa fa-search me-2"></i>
        SEARCH
      </button>
      } @if(searchInputActive){
      <input type="text" class="form-control" />
      <button
        type="button"
        class="btn-close btn-lg bg-white text-black ms-2 py-2 px-2"
        (click)="hideInput()"
      ></button>
      }
    </div>
    <div class="login-registration">
      @if(!authService.loggedIn()){
      <button
        type="button"
        class="btn login-button text-white fs-6 me-3"
        routerLink="/app-registration"
        routerLinkActive="active"
        ariaCurrentWhenActive="page"
        test-id = "login-button"
      >
        <i class="fa fa-user me-2"></i>
        LOG IN
      </button>
      } @if(authService.loggedIn()){
      <div class="loggedin-state d-grid text-center">
        <button
          type="button"
          class="btn logout-btn text-white me-3 mb-2 fs-6"
          (click)="authService.logOut()"
        >
          LOG OUT
        </button>
      </div>
      }
    </div>
  </div>
</header>
<nav class="site-navigation">
  <ul
    class="nav nav-underline pt-5 justify-content-center text-white border-top border-bottom border-light-subtle"
  >
    <li class="nav-item">
      <a
        class="nav-link text-white fs-4"
        routerLink="/app-home"
        routerLinkActive="active"
        ariaCurrentWhenActive="page"
        style="font-family: 'Courier New', Courier, monospace"
      >
        HOME
      </a>
    </li>
    <li class="nav-item">
      <a
        class="nav-link text-white fs-4"
        routerLink="/app-starships"
        routerLinkActive="active"
        ariaCurrentWhenActive="page"
        style="font-family: 'Courier New', Courier, monospace"
      >
        STARSHIPS
      </a>
    </li>
  </ul>
</nav>

<div id="starwars" class="animate d-flex mt-5">
  <div class="max-w-4xl mx-auto">
    <div class=" video-container  overflow-hidden margin-button-negative">
      <video 
        class="max-w-full max-h-80"
        aria-label="Star Wars Starships battle Video"
        autoplay 
        loop 
        muted  
        oncanplay="this.play()" onloadedmetadata="this.muted = true"
        poster="/assets/video/preview.mp4">
        <source src="/assets/video/preview.mp4" type="video/mp4">
      </video>
    </div>
  </div>
  <img src="/assets/mainLogo.png" class="logo " alt="Star Wars Logo" aria-label="Star Wars Logo" />
  <p class="intro">
    A long time ago, <br>in a galaxy far, <br>far away... 
  </p>
  <a 
  class="intro-link"
  routerLink="/app-starships"
  routerLinkActive="active"
  ariaCurrentWhenActive="page">
  Go to Starships
  </a>
</div>

<router-outlet></router-outlet>
